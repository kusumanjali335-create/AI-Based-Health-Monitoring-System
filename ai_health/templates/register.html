{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="{% static 'css/register.css' %}">

</head>

<body>

<div class="container">

    <h2>AI Based Health Monitoring System</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a href="/login/">Login</a>
    </p>

</div>

</body>
</html>
