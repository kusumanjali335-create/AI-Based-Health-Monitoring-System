{% extends 'base.html' %}

{% block content %}

<div class="container mt-5 mb-5">

<div class="card shadow-lg border-0">

<div class="card-header bg-dark text-white text-center">

<h2>🤖 AI Based Health Monitoring System</h2>

<p class="mb-0">

Enter your health details for AI analysis

</p>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Name</label>

<input
type="text"
class="form-control"
name="name"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Age</label>

<input
type="number"
class="form-control"
name="age"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Gender</label>

<select
class="form-control"
name="gender">

<option>Male</option>

<option>Female</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Heart Rate (BPM)

</label>

<input
type="number"
class="form-control"
name="heart_rate"
required>

<small class="text-muted">

Normal: 60–100 BPM

</small>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Blood Pressure (Systolic)

</label>

<input
type="number"
class="form-control"
name="bp_sys"
required>

<small class="text-muted">

Normal: 120 mmHg

</small>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Blood Pressure (Diastolic)

</label>

<input
type="number"
class="form-control"
name="bp_dia"
required>

<small class="text-muted">

Normal: 80 mmHg

</small>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Body Temperature (°C)

</label>

<input
type="number"
step="0.1"
class="form-control"
name="temperature"
required>

<small class="text-muted">

Normal: 36.5°C – 37.5°C

</small>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

SpO₂ (%)

</label>

<input
type="number"
class="form-control"
name="spo2"
required>

<small class="text-muted">

Normal: 95–100%

</small>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Blood Sugar (mg/dL)

</label>

<input
type="number"
class="form-control"
name="blood_sugar"
required>

<small class="text-muted">

Fasting: 70–99 mg/dL

</small>

</div>

</div>

<div class="text-center mt-4">

<button
type="submit"
class="btn btn-dark btn-lg px-5">

🔍 Analyze Health

</button>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
